    const map = new AMap.Map('container', {
        zoom: 12,
        center: [119.3, 26.08] // Fuzhou approx center
    });

    const infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -10) });

    let mapOverlays = [];

    bizData.forEach(biz => {
        if (!biz.boundary || biz.boundary.length === 0) return;

        // 绘制六边形
        const path = biz.boundary;
        const polygon = new AMap.Polygon({
            path: path,
            fillColor: '#1791fc',
            fillOpacity: 0.4,
            strokeColor: '#0066cc',
            strokeWeight: 2,
            extData: biz
        });

        polygon.on('click', function(e) {
            const data = e.target.getExtData();
            
            // Show Polygon InfoWindow
            let content = `<div class="info-window"><h4>商圈信息</h4><table>`;
            content += `<tr><th>六边形ID</th><td>${data['六边形ID'] || ''}</td></tr>`;
            const keys = ['绣球开店', '排序'];
            keys.forEach(k => {
                content += `<tr><th>${k}</th><td>${data[k] !== null && data[k] !== undefined ? data[k] : ''}</td></tr>`;
            });
            content += `</table></div>`;
            
            infoWindow.setContent(content);
            infoWindow.open(map, e.lnglat);
        });

        mapOverlays.push(polygon);
        map.add(polygon);
        
        // 初始化时即展示所有六边形内的门店
        if (biz.shops && biz.shops.length > 0) {
            biz.shops.forEach(shop => {
                if (shop.shop_lon02 && shop.shop_lat02) {
                    const markerContent = '<div style="width:12px;height:12px;background-color:red;border-radius:50%;border:1px solid white;box-shadow: 0 0 2px rgba(0,0,0,0.5);"></div>';
                    const marker = new AMap.Marker({
                        position: [shop.shop_lon02, shop.shop_lat02],
                        map: map,
                        content: markerContent,
                        offset: new AMap.Pixel(-8, -8),
                        title: shop.shop_name || shop.shop_id,
                        extData: shop
                    });
                    
                    marker.on('click', function(me) {
                        const sData = me.target.getExtData();
                        let sContent = `<div class="info-window"><h4>门店信息</h4><table>`;
                        sContent += `<tr><th>门店 ID</th><td>${sData.shop_id || ''}</td></tr>`;
                        sContent += `<tr><th>门店名称</th><td>${sData.shop_name || ''}</td></tr>`;
                        sContent += `<tr><th>开业时间</th><td>${sData.open_date || ''}</td></tr>`;
                        sContent += `</table></div>`;
                        
                        // Because the marker is a small dot, offset infowindow slightly above
                        infoWindow.setContent(sContent);
                        infoWindow.open(map, me.target.getPosition());
                        // AMap 2.0 marker event
                    });
                    
                    mapOverlays.push(marker);
                }
            });
        }
    });

    // Auto fit view to show all polygons and markers
    map.setFitView(mapOverlays);

    // Click map background to clear info window
    map.on('click', function() {
        infoWindow.close();
    });
